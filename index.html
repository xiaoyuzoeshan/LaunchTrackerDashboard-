<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Launch Tracker — Live Space Dashboard</title>
  <style>
    /* ── Reset & Base ───────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #050a14;
      --surface:   #0c1628;
      --surface2:  #112040;
      --border:    #1e3a5f;
      --accent:    #00d4ff;
      --accent2:   #ff6b35;
      --text:      #e8f4fd;
      --muted:     #7090b0;
      --success:   #00e676;
      --warn:      #ffb300;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Starfield ──────────────────────────────────────────────── */
    #stars {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,.9) 0%, transparent 100%),
        radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,.7) 0%, transparent 100%),
        radial-gradient(1px 1px at 50%  5%, rgba(255,255,255,.8) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 40%, rgba(255,255,255,.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 85% 75%, rgba(255,255,255,.9) 0%, transparent 100%),
        radial-gradient(1px 1px at 20% 85%, rgba(255,255,255,.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 60% 90%, rgba(255,255,255,.7) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 15%, rgba(255,255,255,.8) 0%, transparent 100%),
        radial-gradient(1px 1px at 40% 50%, rgba(255,255,255,.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 75% 25%, rgba(255,255,255,.6) 0%, transparent 100%);
    }

    /* ── Layout ─────────────────────────────────────────────────── */
    .wrap { position: relative; z-index: 1; max-width: 1280px; margin: 0 auto; padding: 0 1.5rem; }

    /* ── Header ─────────────────────────────────────────────────── */
    header {
      border-bottom: 1px solid var(--border);
      background: rgba(5,10,20,.85);
      backdrop-filter: blur(12px);
      position: sticky; top: 0; z-index: 100;
    }
    .header-inner {
      display: flex; align-items: center; justify-content: space-between;
      padding: .9rem 0;
    }
    .logo {
      display: flex; align-items: center; gap: .7rem;
      font-size: 1.3rem; font-weight: 700; letter-spacing: .03em;
      color: var(--accent);
    }
    .logo .icon { font-size: 1.6rem; }
    .logo span { color: var(--text); }
    .logo span b { color: var(--accent); }

    .live-badge {
      display: flex; align-items: center; gap: .45rem;
      font-size: .78rem; letter-spacing: .08em; text-transform: uppercase;
      color: var(--success); font-weight: 600;
    }
    .live-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 6px var(--success);
      animation: pulse 1.6s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: .5; transform: scale(.8); }
    }

    /* ── Countdown Hero ──────────────────────────────────────────── */
    .hero {
      padding: 3rem 0 2.5rem;
      text-align: center;
    }
    .hero-label {
      font-size: .8rem; letter-spacing: .15em; text-transform: uppercase;
      color: var(--accent); margin-bottom: .6rem;
    }
    .hero-mission {
      font-size: clamp(1.4rem, 3vw, 2.2rem);
      font-weight: 700; margin-bottom: .3rem;
      line-height: 1.2;
    }
    .hero-meta {
      font-size: .9rem; color: var(--muted); margin-bottom: 2rem;
      display: flex; gap: 1.2rem; justify-content: center; flex-wrap: wrap;
    }
    .hero-meta span { display: flex; align-items: center; gap: .3rem; }

    .countdown {
      display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }
    .cd-unit {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.4rem;
      min-width: 80px;
      text-align: center;
      box-shadow: 0 0 24px rgba(0,212,255,.07);
    }
    .cd-num {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 800;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
      line-height: 1;
      display: block;
    }
    .cd-lbl {
      font-size: .65rem; letter-spacing: .12em; text-transform: uppercase;
      color: var(--muted); margin-top: .3rem; display: block;
    }

    .status-pill {
      display: inline-block;
      padding: .25rem .8rem;
      border-radius: 999px;
      font-size: .75rem; font-weight: 600; letter-spacing: .05em; text-transform: uppercase;
    }
    .status-go      { background: rgba(0,230,118,.15); color: var(--success); border: 1px solid rgba(0,230,118,.3); }
    .status-tbd     { background: rgba(255,179,0,.12);  color: var(--warn);    border: 1px solid rgba(255,179,0,.3); }
    .status-hold    { background: rgba(255,107,53,.15); color: var(--accent2); border: 1px solid rgba(255,107,53,.3); }
    .status-success { background: rgba(0,230,118,.15); color: var(--success); border: 1px solid rgba(0,230,118,.3); }

    /* ── Section ─────────────────────────────────────────────────── */
    .section { padding: 2rem 0 3rem; }
    .section-title {
      font-size: 1rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 1.5rem;
      display: flex; align-items: center; gap: .6rem;
    }
    .section-title::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    /* ── Launch Grid ─────────────────────────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.25rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      transition: border-color .2s, transform .2s, box-shadow .2s;
      cursor: default;
    }
    .card:hover {
      border-color: var(--accent);
      transform: translateY(-3px);
      box-shadow: 0 8px 32px rgba(0,212,255,.1);
    }
    .card.next {
      border-color: var(--accent);
      box-shadow: 0 0 30px rgba(0,212,255,.12);
    }

    .card-img {
      width: 100%; height: 160px; object-fit: cover;
      background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      font-size: 4rem;
      flex-shrink: 0;
    }
    .card-img img { width: 100%; height: 100%; object-fit: cover; }
    .card-img.no-img { background: linear-gradient(135deg, var(--surface2) 0%, #0a1f40 100%); }

    .card-body { padding: 1.1rem 1.25rem 1.25rem; }

    .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: .7rem; gap: .5rem; }
    .card-mission { font-size: 1rem; font-weight: 700; line-height: 1.3; flex: 1; }
    .card-idx { font-size: .7rem; color: var(--muted); font-weight: 600; white-space: nowrap; margin-top: .15rem; }

    .card-meta { display: flex; flex-direction: column; gap: .35rem; }
    .meta-row {
      display: flex; align-items: flex-start; gap: .5rem;
      font-size: .82rem; color: var(--muted); line-height: 1.35;
    }
    .meta-row .meta-icon { flex-shrink: 0; width: 1.1rem; text-align: center; }
    .meta-row .meta-val  { color: var(--text); }

    .card-footer {
      margin-top: 1rem;
      padding-top: .85rem;
      border-top: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
      gap: .5rem;
    }
    .card-date { font-size: .78rem; color: var(--muted); }
    .card-date b { color: var(--text); }

    /* ── Loader / Error ──────────────────────────────────────────── */
    .loader {
      text-align: center; padding: 4rem 1rem;
      color: var(--muted); font-size: .95rem;
    }
    .loader .spinner {
      width: 40px; height: 40px; border-radius: 50%;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      animation: spin .9s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-box {
      background: rgba(255,107,53,.1);
      border: 1px solid rgba(255,107,53,.3);
      border-radius: 10px; padding: 1.5rem;
      color: var(--accent2); text-align: center;
    }
    .error-box p { margin-bottom: .5rem; }
    .error-box small { color: var(--muted); font-size: .8rem; }

    /* ── Footer ─────────────────────────────────────────────────── */
    footer {
      border-top: 1px solid var(--border);
      padding: 1.5rem 0;
      text-align: center;
      font-size: .78rem; color: var(--muted);
    }
    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    /* ── Responsive ──────────────────────────────────────────────── */
    @media (max-width: 600px) {
      .cd-unit { min-width: 60px; padding: .75rem .9rem; }
      .hero-meta { flex-direction: column; align-items: center; gap: .5rem; }
    }
  </style>
</head>
<body>
<div id="stars"></div>

<header>
  <div class="wrap header-inner">
    <div class="logo">
      <span class="icon">🚀</span>
      <span><b>Launch</b>Tracker</span>
    </div>
    <div class="live-badge">
      <div class="live-dot"></div>
      Live Data
    </div>
  </div>
</header>

<main class="wrap">

  <!-- ── Countdown Hero ─── -->
  <section class="hero" id="hero">
    <div class="loader">
      <div class="spinner"></div>
      Acquiring launch data…
    </div>
  </section>

  <!-- ── Upcoming Launches Grid ─── -->
  <section class="section">
    <h2 class="section-title">Upcoming Launches</h2>
    <div class="grid" id="grid">
      <!-- cards injected by JS -->
    </div>
  </section>

</main>

<footer>
  <div class="wrap">
    Data provided by <a href="https://thespacedevs.com/" target="_blank" rel="noopener">The Space Devs</a>
    via Launch Library 2 API &nbsp;·&nbsp;
    Updates every 5 minutes &nbsp;·&nbsp;
    <span id="last-updated"></span>
  </div>
</footer>

<script>
/* ── Config ───────────────────────────────────────────────────────── */
const API = 'https://ll.thespacedevs.com/2.2.0/launch/upcoming/?limit=15&format=json';
const REFRESH_MS = 5 * 60 * 1000; // 5 min

/* ── State ────────────────────────────────────────────────────────── */
let launches = [];
let countdownInterval = null;

/* ── Fetch ────────────────────────────────────────────────────────── */
async function fetchLaunches() {
  const res = await fetch(API);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const data = await res.json();
  return (data.results || []).filter(l => l.net); // must have NET date
}

/* ── Countdown ────────────────────────────────────────────────────── */
function timeDiff(target) {
  const diff = new Date(target) - Date.now();
  if (diff <= 0) return null;
  const d = Math.floor(diff / 86400000);
  const h = Math.floor((diff % 86400000) / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);
  return { d, h, m, s, diff };
}

function pad(n) { return String(n).padStart(2, '0'); }

function startCountdown(net) {
  if (countdownInterval) clearInterval(countdownInterval);

  function tick() {
    const t = timeDiff(net);
    const nums = document.querySelectorAll('.cd-num');
    if (!nums.length) return;
    if (!t) {
      nums[0].closest('.countdown').innerHTML =
        '<span style="color:var(--success);font-size:1.3rem;font-weight:700">🟢 Launch Window Open</span>';
      clearInterval(countdownInterval);
      return;
    }
    if (nums[0]) nums[0].textContent = pad(t.d);
    if (nums[1]) nums[1].textContent = pad(t.h);
    if (nums[2]) nums[2].textContent = pad(t.m);
    if (nums[3]) nums[3].textContent = pad(t.s);
  }

  tick();
  countdownInterval = setInterval(tick, 1000);
}

/* ── Status helpers ───────────────────────────────────────────────── */
function statusClass(abbrev) {
  if (!abbrev) return 'status-tbd';
  const a = abbrev.toLowerCase();
  if (a === 'go')      return 'status-go';
  if (a === 'success') return 'status-success';
  if (a === 'hold' || a === 'failure') return 'status-hold';
  return 'status-tbd';
}

function statusLabel(status) {
  return status?.abbrev || status?.name || 'TBD';
}

/* ── Date formatting ──────────────────────────────────────────────── */
function fmtDate(net, precision) {
  if (!net) return 'TBD';
  const d = new Date(net);
  // If precision is low (day or month level), show less detail
  if (precision && precision <= 2) return d.toLocaleDateString(undefined, { year:'numeric', month:'short' });
  if (precision && precision <= 3) return d.toLocaleDateString(undefined, { year:'numeric', month:'short', day:'numeric' });
  return d.toLocaleString(undefined, {
    year:'numeric', month:'short', day:'numeric',
    hour:'2-digit', minute:'2-digit', timeZoneName:'short'
  });
}

/* ── Render Hero ──────────────────────────────────────────────────── */
function renderHero(launch) {
  const hero = document.getElementById('hero');
  if (!launch) {
    hero.innerHTML = '<p style="color:var(--muted);text-align:center">No upcoming launches found.</p>';
    return;
  }

  const rocket  = launch.rocket?.configuration?.name || 'Unknown Rocket';
  const mission = launch.name || 'Unknown Mission';
  const site    = launch.pad?.name || launch.pad?.location?.name || 'Unknown Site';
  const net     = launch.net;
  const status  = launch.status;

  hero.innerHTML = `
    <div class="hero-label">Next Launch</div>
    <div class="hero-mission">${escHtml(mission)}</div>
    <div class="hero-meta">
      <span>🚀 ${escHtml(rocket)}</span>
      <span>📍 ${escHtml(site)}</span>
      <span>${fmtDate(net, launch.net_precision?.id)}</span>
    </div>
    <div class="countdown">
      <div class="cd-unit"><span class="cd-num">--</span><span class="cd-lbl">Days</span></div>
      <div class="cd-unit"><span class="cd-num">--</span><span class="cd-lbl">Hours</span></div>
      <div class="cd-unit"><span class="cd-num">--</span><span class="cd-lbl">Mins</span></div>
      <div class="cd-unit"><span class="cd-num">--</span><span class="cd-lbl">Secs</span></div>
    </div>
    <span class="status-pill ${statusClass(status?.abbrev)}">${escHtml(statusLabel(status))}</span>
  `;

  startCountdown(net);
}

/* ── Render Card ──────────────────────────────────────────────────── */
function renderCard(launch, idx) {
  const mission = launch.name || 'Unknown Mission';
  const rocket  = launch.rocket?.configuration?.full_name || launch.rocket?.configuration?.name || 'Unknown Rocket';
  const site    = launch.pad?.name || 'Unknown Pad';
  const location = launch.pad?.location?.name || '';
  const agency  = launch.launch_service_provider?.name || '';
  const net     = launch.net;
  const status  = launch.status;
  const imgUrl  = launch.image;

  const imgHtml = imgUrl
    ? `<div class="card-img"><img src="${escAttr(imgUrl)}" alt="${escAttr(mission)}" loading="lazy" onerror="this.parentElement.classList.add('no-img');this.remove();this.parentElement.textContent='🚀'"/></div>`
    : `<div class="card-img no-img">🚀</div>`;

  return `
    <div class="card ${idx === 0 ? 'next' : ''}">
      ${imgHtml}
      <div class="card-body">
        <div class="card-header">
          <div class="card-mission">${escHtml(mission)}</div>
          <div class="card-idx">#${idx + 1}</div>
        </div>
        <div class="card-meta">
          <div class="meta-row">
            <span class="meta-icon">🚀</span>
            <span class="meta-val">${escHtml(rocket)}</span>
          </div>
          <div class="meta-row">
            <span class="meta-icon">📍</span>
            <span class="meta-val">${escHtml(site)}${location ? ' — ' + escHtml(location) : ''}</span>
          </div>
          ${agency ? `
          <div class="meta-row">
            <span class="meta-icon">🏢</span>
            <span class="meta-val">${escHtml(agency)}</span>
          </div>` : ''}
        </div>
        <div class="card-footer">
          <div class="card-date"><b>${fmtDate(net, launch.net_precision?.id)}</b></div>
          <span class="status-pill ${statusClass(status?.abbrev)}">${escHtml(statusLabel(status))}</span>
        </div>
      </div>
    </div>
  `;
}

/* ── Render Grid ──────────────────────────────────────────────────── */
function renderGrid(list) {
  const grid = document.getElementById('grid');
  if (!list.length) {
    grid.innerHTML = '<p style="color:var(--muted)">No launches to display.</p>';
    return;
  }
  grid.innerHTML = list.map((l, i) => renderCard(l, i)).join('');
}

/* ── Safety helpers ───────────────────────────────────────────────── */
function escHtml(str) {
  return String(str ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function escAttr(str) { return escHtml(str); }

/* ── Load & refresh ───────────────────────────────────────────────── */
async function load() {
  try {
    launches = await fetchLaunches();
    renderHero(launches[0] || null);
    renderGrid(launches);
    document.getElementById('last-updated').textContent =
      'Updated ' + new Date().toLocaleTimeString();
  } catch (err) {
    console.error(err);
    document.getElementById('hero').innerHTML = `
      <div class="error-box">
        <p>⚠️ Could not fetch launch data</p>
        <small>${escHtml(err.message)} — Check your connection or try again shortly.</small>
      </div>`;
    document.getElementById('grid').innerHTML = `
      <div class="error-box" style="grid-column:1/-1">
        <p>⚠️ Launch data unavailable</p>
        <small>The Space Devs API may be rate-limited. Retrying in 5 minutes…</small>
      </div>`;
  }
}

load();
setInterval(load, REFRESH_MS);
</script>
</body>
</html>
